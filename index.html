<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7A0019">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>HSK 2 — Atlas Interativo</title>
<style>
/* ============================================================
   HSK 2 — Atlas Interativo (Mobile-First)
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;600;700&display=swap');

:root {
  --red: #C8102E;
  --red-dark: #7A0019;
  --gold: #D4A017;
  --gold-light: #F5CC5A;
  --ink: #0D0D1A;
  --panel-bg: rgba(13, 13, 30, 0.97);
  --white: #FFFFFF;
  --header-h: 48px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--ink);
  color: var(--white);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

#header {
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  height: var(--header-h);
  padding: 0 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
  border-bottom: 2px solid var(--gold);
}

.hdr-left {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.hdr-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.hdr-title h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: var(--gold-light);
  white-space: nowrap;
}

.hdr-title p {
  font-size: 8px;
  color: rgba(255,255,255,0.5);
  display: none;
}

.hdr-right {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.mode-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.mode-btn:active,
.mode-btn.active {
  background: var(--gold);
  color: var(--ink);
  border-color: var(--gold);
}

#lesson-bar {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 4px 8px;
  background: rgba(8,8,20,0.95);
  border-bottom: 1px solid rgba(212,160,23,0.08);
  flex-shrink: 0;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

#lesson-bar::-webkit-scrollbar {
  display: none;
}

.lm-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,160,23,0.15);
  color: rgba(255,255,255,0.5);
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
  min-height: 30px;
}

.lm-btn:active {
  transform: scale(0.95);
}

.lm-btn.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

#canvas-zone {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#bg-c {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#progress {
  position: absolute;
  top: 4px;
  right: 10px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 10px;
  color: var(--gold-light);
  z-index: 20;
  border: 1px solid rgba(212,160,23,0.15);
}

#card-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  z-index: 10;
  perspective: 1000px;
  width: min(300px, 88vw);
}

.flashcard {
  width: 100%;
  height: 180px;
  position: relative;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.flashcard.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px;
}

.card-front {
  background: linear-gradient(145deg, #0F0F2E, #1A1A4A);
  border: 1.5px solid var(--gold);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

.card-back {
  background: linear-gradient(145deg, var(--red-dark), #4A0010);
  border: 1.5px solid var(--gold-light);
  transform: rotateY(180deg);
}

.c-tag {
  position: absolute;
  top: 8px;
  left: 12px;
  font-size: 9px;
  color: rgba(212,160,23,0.5);
  font-weight: 700;
  letter-spacing: 0.5px;
}

.c-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 60px;
  color: var(--gold-light);
  text-shadow: 0 0 30px rgba(212,160,23,0.3);
  line-height: 1;
}

.c-char.l2 { font-size: 48px; }
.c-char.l3 { font-size: 38px; }
.c-char.l4 { font-size: 30px; }
.c-char.l5 { font-size: 24px; }

.c-py {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}

.c-hint {
  font-size: 8px;
  color: rgba(255,255,255,0.15);
  position: absolute;
  bottom: 8px;
}

.c-meaning {
  font-size: 17px;
  color: var(--white);
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}

.c-py-back {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 6px;
}

.audio-btn {
  position: absolute;
  top: 8px;
  right: 12px;
  background: rgba(212,160,23,0.15);
  border: 1px solid rgba(212,160,23,0.2);
  color: var(--gold-light);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 5;
}

.audio-btn:active {
  background: var(--gold);
  color: var(--ink);
  transform: scale(0.9);
}

#counter {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.3);
  padding: 2px 14px;
  border-radius: 12px;
  backdrop-filter: blur(4px);
}

#card-nav {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  z-index: 15;
}

.nav-btn {
  background: rgba(212,160,23,0.1);
  border: 1px solid rgba(212,160,23,0.2);
  color: var(--gold-light);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.nav-btn:active {
  background: var(--gold);
  color: var(--ink);
  transform: scale(0.92);
}

#quiz-zone {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  z-index: 15;
  padding: 16px;
}

#quiz-zone.visible {
  display: flex;
}

#qscore {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  font-weight: 700;
}

#qchar {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  color: var(--gold-light);
  text-shadow: 0 0 30px rgba(212,160,23,0.3);
}

#qpy {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}

#qopts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  width: min(300px, 92vw);
}

.q-option {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 6px;
  cursor: pointer;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  text-align: center;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
  min-height: 48px;
}

.q-option:active {
  background: rgba(212,160,23,0.12);
  border-color: var(--gold);
}

.q-option.correct {
  background: rgba(34,197,94,0.2);
  border-color: #22C55E;
  color: #86EFAC;
}

.q-option.wrong {
  background: rgba(200,16,46,0.2);
  border-color: var(--red);
  color: #FCA5A5;
}

#qnext {
  background: var(--gold);
  color: var(--ink);
  border: none;
  padding: 10px 28px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  display: none;
  font-family: 'Inter', sans-serif;
}

#qnext.visible {
  display: block;
}

#stroke-indicator {
  display: none;
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(200,16,46,0.9);
  color: white;
  padding: 4px 14px;
  border-radius: 14px;
  font-size: 10px;
  font-weight: 700;
  z-index: 20;
  border: 1px solid var(--gold);
  white-space: nowrap;
}

#bottom-panel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 50vh;
  background: var(--panel-bg);
  border-top: 1.5px solid rgba(212,160,23,0.2);
  border-radius: 16px 16px 0 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 50;
  transform: translateY(calc(100% - 40px));
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  padding-bottom: var(--safe-bottom);
}

#bottom-panel.open {
  transform: translateY(0);
}

#panel-handle {
  display: flex;
  justify-content: center;
  padding: 8px 0 4px;
  cursor: pointer;
  flex-shrink: 0;
}

#panel-handle::before {
  content: '';
  width: 40px;
  height: 4px;
  background: rgba(212,160,23,0.3);
  border-radius: 2px;
}

#tabs {
  display: flex;
  border-bottom: 1px solid rgba(212,160,23,0.08);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 8px 2px;
  text-align: center;
  cursor: pointer;
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-weight: 700;
  letter-spacing: 0.3px;
  background: transparent;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'Inter', sans-serif;
}

.tab:active {
  transform: scale(0.96);
}

.tab.active {
  color: var(--gold-light);
  border-bottom-color: var(--gold);
}

#panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,160,23,0.15) transparent;
}

#panel-content::-webkit-scrollbar {
  width: 3px;
}
#panel-content::-webkit-scrollbar-thumb {
  background: rgba(212,160,23,0.15);
  border-radius: 2px;
}

.panel-section {
  display: none;
}

.panel-section.active {
  display: block;
}

.lesson-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  color: var(--gold-light);
  margin-bottom: 2px;
}

.lesson-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}

.search {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,160,23,0.12);
  border-radius: 8px;
  padding: 8px 12px;
  color: white;
  font-size: 14px;
  margin-bottom: 6px;
  outline: none;
  font-family: 'Inter', sans-serif;
  -webkit-appearance: none;
}

.search::placeholder {
  color: rgba(255,255,255,0.2);
}

.search:focus {
  border-color: var(--gold);
}

.vocab-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  border: 1px solid transparent;
  min-height: 42px;
}

.vocab-item:active {
  background: rgba(212,160,23,0.06);
}

.vocab-item.active {
  background: rgba(200,16,46,0.12);
  border-color: rgba(200,16,46,0.2);
}

.v-num {
  font-size: 9px;
  color: rgba(255,255,255,0.15);
  min-width: 16px;
  font-weight: 600;
}

.v-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  color: var(--gold-light);
  min-width: 36px;
  text-align: center;
}

.v-py {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  flex: 1;
}

.v-pt {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  flex: 1;
  text-align: right;
}

.dialog-block {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 8px;
}

.dialog-title {
  font-size: 9px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.dialog-line {
  margin-bottom: 5px;
}

.dlg-sp {
  font-size: 9px;
  color: rgba(212,160,23,0.6);
  font-weight: 700;
}

.dlg-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  line-height: 1.4;
}

.dlg-py {
  font-size: 8px;
  color: rgba(255,255,255,0.3);
  font-style: italic;
}

.dlg-pt {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
}

#stroke-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
}

#stroke-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 24px;
  color: var(--gold-light);
}

#stroke-py {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
}

#stroke-mean {
  font-size: 11px;
  color: var(--white);
  font-weight: 600;
}

#stroke-canvas-wrap {
  position: relative;
  border: 1.5px solid rgba(212,160,23,0.15);
  border-radius: 10px;
  overflow: hidden;
  background: #FDF6E3;
  width: 180px;
  height: 180px;
  touch-action: none;
}

#stroke-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

#stroke-canvas {
  display: block;
  cursor: crosshair;
  touch-action: none;
  width: 100%;
  height: 100%;
}

#stroke-ghost {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', serif;
  color: rgba(200,16,46,0.06);
  pointer-events: none;
  text-align: center;
  line-height: 1;
}

#stroke-nav {
  display: flex;
  gap: 6px;
}

.sbtn {
  background: rgba(212,160,23,0.06);
  border: 1px solid rgba(212,160,23,0.15);
  color: var(--gold-light);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
  min-height: 34px;
}

.sbtn:active {
  background: var(--gold);
  color: var(--ink);
}

.section-label {
  font-size: 9px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(212,160,23,0.06);
}

#all-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

.word-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
  padding: 5px 6px;
  cursor: pointer;
  transition: all 0.12s;
  min-height: 40px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.word-card:active {
  background: rgba(212,160,23,0.06);
  border-color: rgba(212,160,23,0.12);
}

.wc-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  color: var(--gold-light);
}

.wc-py {
  font-size: 7px;
  color: rgba(255,255,255,0.3);
}

.wc-pt {
  font-size: 8px;
  color: rgba(255,255,255,0.5);
  flex: 1;
}

.wc-lesson {
  font-size: 7px;
  color: rgba(200,16,46,0.5);
  font-weight: 700;
  background: rgba(200,16,46,0.08);
  padding: 0 6px;
  border-radius: 3px;
}

@media (min-width: 600px) {
  .hdr-title p { display: block; }
  #bottom-panel {
    position: static;
    height: auto;
    transform: none !important;
    border-radius: 0;
    border-top: none;
    border-left: 1px solid rgba(212,160,23,0.08);
    width: 300px;
    flex-shrink: 0;
    padding-bottom: 0;
  }
  #panel-handle { display: none; }
  #main { flex-direction: row; }
  #card-wrap { width: min(340px, 45vw); }
  .flashcard { height: 200px; }
  .c-char { font-size: 68px; }
  .c-char.l2 { font-size: 56px; }
  .c-char.l3 { font-size: 44px; }
  .c-char.l4 { font-size: 34px; }
  .c-char.l5 { font-size: 26px; }
  #stroke-canvas-wrap { width: 200px; height: 200px; }
  #all-grid { grid-template-columns: 1fr 1fr 1fr; }
}

@media (min-width: 1024px) {
  #bottom-panel { width: 340px; }
  #card-wrap { width: 380px; }
  .flashcard { height: 220px; }
  .c-char { font-size: 76px; }
  .c-char.l2 { font-size: 62px; }
  .c-char.l3 { font-size: 48px; }
  .c-char.l4 { font-size: 38px; }
  .c-char.l5 { font-size: 28px; }
  #stroke-canvas-wrap { width: 220px; height: 220px; }
  #all-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .nav-btn:hover { background: var(--gold); color: var(--ink); }
  .q-option:hover { background: rgba(212,160,23,0.08); border-color: rgba(212,160,23,0.3); }
  .vocab-item:hover { background: rgba(212,160,23,0.04); }
  .word-card:hover { background: rgba(212,160,23,0.04); border-color: rgba(212,160,23,0.08); }
  .sbtn:hover { background: var(--gold); color: var(--ink); }
  .lm-btn:hover { background: rgba(212,160,23,0.1); color: white; }
}

@media (max-height: 500px) and (orientation: landscape) {
  #header { height: 38px; }
  .flashcard { height: 140px; }
  .c-char { font-size: 44px; }
  .c-char.l2 { font-size: 36px; }
  .c-char.l3 { font-size: 28px; }
  .c-char.l4 { font-size: 22px; }
  #bottom-panel { height: 60vh; }
  #stroke-canvas-wrap { width: 140px; height: 140px; }
  #qchar { font-size: 38px; }
  #qopts { grid-template-columns: 1fr 1fr; max-width: 280px; }
}

@media (prefers-reduced-motion: reduce) {
  .flashcard { transition-duration: 0.01ms !important; }
  #bottom-panel { transition-duration: 0.01ms !important; }
  * { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<header id="header">
  <div class="hdr-left">
    <span class="hdr-icon">🐉</span>
    <div class="hdr-title">
      <h1>HSK 2 · 二级</h1>
      <p>15 Lições · Vocabulário · Diálogos · Áudio</p>
    </div>
  </div>
  <div class="hdr-right">

// ═══════════════════════════════════════════════════════════════
// BARRA DE LIÇÕES
// ═══════════════════════════════════════════════════════════════

function buildLessonBar() {
  els.lessonBar.innerHTML = '';
  LESSONS.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'lm-btn' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.textContent = `L${l.num}`;
    btn.title = l.zh;
    btn.addEventListener('click', () => selectLesson(i));
    els.lessonBar.appendChild(btn);
  });
}

function selectLesson(idx) {
  state.lesson = idx;
  state.card = 0;
  state.flipped = false;
  els.flashcard.classList.remove('flipped');

  $$('.lm-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

  const btn = els.lessonBar.querySelector(`.lm-btn[data-idx="${idx}"]`);
  if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  updateCard();
  buildVocab();
  buildTexts();
  updateProgress();
}

// ═══════════════════════════════════════════════════════════════
// CARTÃO
// ═══════════════════════════════════════════════════════════════

function updateCard() {
  const L = LESSONS[state.lesson];
  const w = L.words[state.card];

  els.ctag.textContent = `L${L.num}`;
  els.cchar.textContent = w.ch;
  els.cpy.textContent = w.py;
  els.cmean.textContent = w.pt;
  els.cpyb.textContent = w.py;
  els.ctr.textContent = `${state.card + 1}/${L.words.length}`;

  const len = w.ch.length;
  els.cchar.className = 'c-char';
  if (len === 2) els.cchar.classList.add('l2');
  else if (len === 3) els.cchar.classList.add('l3');
  else if (len === 4) els.cchar.classList.add('l4');
  else if (len >= 5) els.cchar.classList.add('l5');

  $$('.vocab-item').forEach((el, i) => el.classList.toggle('active', i === state.card));
  updateStrokeChar(w);
}

function updateProgress() {
  const total = LESSONS.reduce((s, l) => s + l.words.length, 0);
  const done = LESSONS.slice(0, state.lesson).reduce((s, l) => s + l.words.length, 0) + state.card;
  const pct = Math.round((done / total) * 100);
  els.progress.textContent = pct + '%';
}

function flipCard() {
  if (state.mode === 'quiz') return;
  state.flipped = !state.flipped;
  els.flashcard.classList.toggle('flipped', state.flipped);
}

function nextCard() {
  const L = LESSONS[state.lesson];
  state.card = (state.card + 1) % L.words.length;
  state.flipped = false;
  els.flashcard.classList.remove('flipped');
  updateCard();
  updateProgress();
}

function prevCard() {
  const L = LESSONS[state.lesson];
  state.card = (state.card - 1 + L.words.length) % L.words.length;
  state.flipped = false;
  els.flashcard.classList.remove('flipped');
  updateCard();
  updateProgress();
}

// ═══════════════════════════════════════════════════════════════
// ÁUDIO
// ═══════════════════════════════════════════════════════════════

function setupAudio() {
  els.audioBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // impede o flip do cartão
    playAudio();
  });
}

function playAudio() {
  const L = LESSONS[state.lesson];
  const w = L.words[state.card];

  // Usa a Web Speech API (TTS) do navegador
  if ('speechSynthesis' in window) {
    // Cancela qualquer fala anterior
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(w.ch);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    utterance.volume = 1;

    // Tenta selecionar uma voz chinesa, se disponível
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.startsWith('zh'));
    if (zhVoice) utterance.voice = zhVoice;

    window.speechSynthesis.speak(utterance);
  } else {
    alert('🔊 Seu navegador não suporta áudio TTS.');
  }
}

// Carrega as vozes antecipadamente (para alguns navegadores)
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };
}

// ═══════════════════════════════════════════════════════════════
// VOCABULÁRIO
// ═══════════════════════════════════════════════════════════════

function buildVocab(filter = '') {
  const L = LESSONS[state.lesson];
  const words = filter ? L.words.filter(w =>
    w.ch.includes(filter) ||
    w.py.toLowerCase().includes(filter.toLowerCase()) ||
    w.pt.toLowerCase().includes(filter.toLowerCase())
  ) : L.words;

  els.lessonInfo.innerHTML = `
    <div class="lesson-title">第${L.num}课 · ${L.zh}</div>
    <div class="lesson-sub">${L.pt} · ${L.words.length} palavras</div>
  `;

  els.vocabList.innerHTML = '';
  words.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'vocab-item' + (i === state.card ? ' active' : '');
    div.innerHTML = `
      <span class="v-num">${i + 1}</span>
      <span class="v-char">${w.ch}</span>
      <span class="v-py">${w.py}</span>
      <span class="v-pt">${w.pt}</span>
    `;
    div.addEventListener('click', () => {
      state.card = words.indexOf(w);
      state.flipped = false;
      els.flashcard.classList.remove('flipped');
      updateCard();
      updateProgress();
    });
    els.vocabList.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════
// TEXTOS
// ═══════════════════════════════════════════════════════════════

function buildTexts() {
  const L = LESSONS[state.lesson];
  let html = `
    <div class="lesson-title">第${L.num}课 · Textos</div>
    <div class="lesson-sub">${L.zh}</div>
  `;

  L.texts.forEach(t => {
    html += `<div class="dialog-block"><div class="dialog-title">${t.title}</div>`;
    t.lines.forEach(ln => {
      html += `
        <div class="dialog-line">
          <div class="dlg-sp">${ln.sp}</div>
          <div class="dlg-zh">${ln.zh}</div>
          <div class="dlg-py">${ln.py}</div>
          <div class="dlg-pt">${ln.pt}</div>
        </div>
      `;
    });
    html += `</div>`;
  });

  els.textContent.innerHTML = html;
}

// TODAS AS 300
// ═══════════════════════════════════════════════════════════════

function buildAll300(filter = '') {
  const list = filter ? ALL_300.filter(w =>
    w.ch.includes(filter) ||
    w.py.toLowerCase().includes(filter.toLowerCase()) ||
    w.pt.toLowerCase().includes(filter.toLowerCase())
  ) : ALL_300;

  els.allGrid.innerHTML = '';
  list.forEach(w => {
    const div = document.createElement('div');
    div.className = 'word-card';
    div.innerHTML = `
      <span class="wc-char">${w.ch}</span>
      <span class="wc-py">${w.py}</span>
      <span class="wc-pt">${w.pt}</span>
      ${w.l ? `<span class="wc-lesson">L${w.l}</span>` : ''}
    `;
    div.addEventListener('click', () => {
      for (let i = 0; i < LESSONS.length; i++) {
        const idx = LESSONS[i].words.findIndex(ww => ww.ch === w.ch);
        if (idx !== -1) {
          selectLesson(i);
          state.card = idx;
          updateCard();
          updateProgress();
          switchTab('vocab');
          break;
        }
      }
    });
    els.allGrid.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════
// ESCRITA
// ═══════════════════════════════════════════════════════════════

let strokeDrawing = false;

function setupStroke() {
  const canvas = els.strokeCanvas;
  const ctx = canvas.getContext('2d');
  const grid = els.strokeGrid.getContext('2d');

  function drawGrid() {
    grid.clearRect(0, 0, 220, 220);
    grid.strokeStyle = 'rgba(200,16,46,0.08)';
    grid.lineWidth = 1;
    grid.strokeRect(0, 0, 220, 220);
    grid.setLineDash([4, 4]);
    grid.beginPath();
    grid.moveTo(110, 0);
    grid.lineTo(110, 220);
    grid.stroke();
    grid.beginPath();
    grid.moveTo(0, 110);
    grid.lineTo(220, 110);
    grid.stroke();
    grid.setLineDash([]);
    grid.strokeStyle = 'rgba(200,16,46,0.03)';
    grid.beginPath();
    grid.moveTo(0, 0);
    grid.lineTo(220, 220);
    grid.stroke();
    grid.beginPath();
    grid.moveTo(220, 0);
    grid.lineTo(0, 220);
    grid.stroke();
  }
  drawGrid();

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) * (220 / rect.width),
      y: (touch.clientY - rect.top) * (220 / rect.height)
    };
  }

  function startDraw(e) {
    e.preventDefault();
    strokeDrawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  function draw(e) {
    e.preventDefault();
    if (!strokeDrawing) return;
    const p = getPos(e);
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#C8102E';
    ctx.shadowColor = 'rgba(200,16,46,0.3)';
    ctx.shadowBlur = 4;
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.shadowBlur = 0;
  }

  function endDraw(e) {
    e.preventDefault();
    strokeDrawing = false;
    ctx.shadowBlur = 0;
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });

  $('stroke-clear').addEventListener('click', () => {
    ctx.clearRect(0, 0, 220, 220);
    drawGrid();
  });

  $('stroke-prev').addEventListener('click', () => {
    const L = LESSONS[state.lesson];
    state.strokeIdx = (state.strokeIdx - 1 + L.words.length) % L.words.length;
    updateStrokeChar(L.words[state.strokeIdx]);
    ctx.clearRect(0, 0, 220, 220);
    drawGrid();
  });

  $('stroke-next').addEventListener('click', () => {
    const L = LESSONS[state.lesson];
    state.strokeIdx = (state.strokeIdx + 1) % L.words.length;
    updateStrokeChar(L.words[state.strokeIdx]);
    ctx.clearRect(0, 0, 220, 220);
    drawGrid();
  });
}

function updateStrokeChar(w) {
  els.strokeChar.textContent = w.ch;
  els.strokePy.textContent = w.py;
  els.strokeMean.textContent = w.pt;

  const len = w.ch.length;
  let size = 88;
  if (len === 2) size = 72;
  else if (len === 3) size = 52;
  else if (len === 4) size = 38;
  else if (len >= 5) size = 28;
  els.strokeGhost.style.fontSize = size + 'px';
  els.strokeGhost.textContent = w.ch;

  els.strokeCanvas.getContext('2d').clearRect(0, 0, 220, 220);
}

// ═══════════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════════

function setupQuiz() {
  els.qnext.addEventListener('click', nextQuizQuestion);
}

function startQuiz() {
  quiz.answered = false;
  quiz.total++;
  const L = LESSONS[state.lesson];
  const idx = Math.floor(Math.random() * L.words.length);
  const word = L.words[idx];
  state.card = idx;

  els.qchar.textContent = word.ch;
  els.qpy.textContent = word.py;

  const options = [word];
  const pool = ALL_300.filter(w => w.ch !== word.ch);
  while (options.length < 4) {
    const r = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
    if (r) options.push(r);
  }

  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  quiz.correctIdx = options.indexOf(word);

  els.qopts.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-option';
    btn.textContent = opt.pt;
    btn.addEventListener('click', () => answerQuiz(i));
    els.qopts.appendChild(btn);
  });

  els.qnext.classList.remove('visible');
  updateQuizScore();
}

function answerQuiz(chosen) {
  if (quiz.answered) return;
  quiz.answered = true;

  const btns = els.qopts.querySelectorAll('.q-option');
  if (chosen === quiz.correctIdx) {
    btns[chosen].classList.add('correct');
    quiz.score++;
  } else {
    btns[chosen].classList.add('wrong');
    btns[quiz.correctIdx].classList.add('correct');
  }

  updateQuizScore();
  els.qnext.classList.add('visible');
}

function nextQuizQuestion() {
  startQuiz();
}

function updateQuizScore() {
  const pct = quiz.total > 0 ? Math.round((quiz.score / quiz.total) * 100) : 0;
  els.qscore.textContent = `${pct}% · ${quiz.score}/${quiz.total}`;
}

// ═══════════════════════════════════════════════════════════════
// PAINEL INFERIOR
// ═══════════════════════════════════════════════════════════════

let panelOpen = true;

function setupPanel() {
  const handle = $('panel-handle');
  handle.addEventListener('click', () => {
    panelOpen = !panelOpen;
    els.panel.classList.toggle('open', panelOpen);
  });
  els.panel.classList.add('open');
}

// ═══════════════════════════════════════════════════════════════
// ABAS
// ═══════════════════════════════════════════════════════════════

function setupTabs() {
  $$('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const tabId = tab.dataset.tab;
      switchTab(tabId);
    });
  });
}

function switchTab(id) {
  state.tab = id;

  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  $$('.panel-section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');

  if (id === 'stroke') {
    els.strokeIndicator.style.display = 'block';
  } else {
    els.strokeIndicator.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
// MODOS
// ═══════════════════════════════════════════════════════════════

function setupModeButtons() {
  $$('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      setMode(mode);
    });
  });
}

function setMode(mode) {
  state.mode = mode;

  $$('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  const isCards = mode === 'cards';
  const isQuiz = mode === 'quiz';
  const isStroke = mode === 'stroke';

  els.cardWrap.style.display = isCards ? '' : 'none';
  els.quizZone.classList.toggle('visible', isQuiz);
  els.strokeIndicator.style.display = isStroke ? 'block' : 'none';
  els.counter.style.display = isCards ? '' : 'none';
  const nav = document.getElementById('card-nav');
  if (nav) nav.style.display = isCards ? '' : 'none';

  if (isQuiz) startQuiz();
  if (isStroke) {
    const L = LESSONS[state.lesson];
    updateStrokeChar(L.words[state.strokeIdx]);
    switchTab('stroke');
  }
  if (isCards) switchTab('vocab');
}

// ═══════════════════════════════════════════════════════════════
// FUNDO ANIMADO
// ═══════════════════════════════════════════════════════════════

function startBackground() {
  const canvas = $('bg-c');
  const ctx = canvas.getContext('2d');

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = '中文学习汉语水平考试读写听说爱好你我'.split('');
  const particles = [];

  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vy: -(0.1 + Math.random() * 0.3),
      vx: (Math.random() - 0.5) * 0.1,
      size: 14 + Math.random() * 18,
      char: chars[Math.floor(Math.random() * chars.length)],
      alpha: 0.02 + Math.random() * 0.06
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      if (p.y < -30) {
        p.y = canvas.height + 30;
        p.x = Math.random() * canvas.width;
      }
      if (p.x < -30) p.x = canvas.width + 30;
      if (p.x > canvas.width + 30) p.x = -30;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.font = `${p.size}px "Noto Serif SC", serif`;
      ctx.fillStyle = '#C8102E';
      ctx.fillText(p.char, p.x, p.y);
      ctx.restore();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

// ═══════════════════════════════════════════════════════════════
// TECLADO
// ═══════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') {
    e.preventDefault();
    flipCard();
  }
  if (e.key === 'ArrowUp') selectLesson(Math.max(0, state.lesson - 1));
  if (e.key === 'ArrowDown') selectLesson(Math.min(LESSONS.length - 1, state.lesson + 1));
  if (e.key === '1') setMode('cards');
  if (e.key === '2') setMode('quiz');
  if (e.key === '3') setMode('stroke');
});

document.addEventListener('DOMContentLoaded', init);
